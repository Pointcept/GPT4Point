datasets:
  objaverse_retrieval: # name of the dataset builder
    dataset_card: dataset_card/objaverse_caption.md
    # data_dir: ${env.data_dir}/datasets
    # data_type: images # [images|videos|features]
    data_type: [points] # [images, points]
    build_info:
      # Be careful not to append minus sign (-) before split to avoid itemizing
      annotations:
        train:
          url: https://storage.googleapis.com//datasets/coco_karpathy_train.json
          md5: aa31ac474cf6250ebb81d18348a07ed8
          storage: objaverse/blip2obja_ret/objaverse_retrival_blip2_train_full.json
        val:
          url: https://storage.googleapis.com/datasets/coco_karpathy_val.json
          md5: b273847456ef5580e33713b1f7de52a0
          storage:  objaverse/blip2obja_ret/objaverse_retrival_blip2_valtest_full.json
        test:
          url: https://storage.googleapis.com/datasets/coco_karpathy_test.json
          md5: 3ff34b0ef2db02d01c37399f6a2a6cd1
          storage: objaverse/blip2obja_ret/objaverse_retrival_blip2_valtest_full.json
      # images:
      #   storage: objaverse/images/
      points:
        storage: objaverse/objaverse_pc_parallel/
