model:
  arch: point_blip
  model_type: pretrain
  load_pretrained: True
  pretrain: 'model/point_blip_obja_stage2_opt2.7b_best_checkpoint.pth'
  load_finetuned: False 
  freeze_vit: False

datasets:
  objaverse_retrieval: # name of the dataset builder
    text_processor:
        train:
          name: "blip_caption"
        eval:
          name: "blip_caption"
    pts_processor:
        train:
          name: "pointblip_objaverse_point_train"
        eval:
          name: "pointblip_objaverse_point_eval"
    build_info:
        images:
            storage: '/nvme/datasets/lavis/coco/images/'

run:
  task: retrieval3d
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 0
  warmup_lr: 1e-8
  warmup_steps: 1000
  weight_decay: 0.05
  max_epoch: 5
  batch_size_train: 8
  batch_size_eval: 16
  lr_layer_decay: 0.95 # layer-wise learning rate decay for the ViT 
  num_workers: 4
  accum_grad_iters: 1

  seed: 42
  output_dir: "output/BLIP2/retrieval3d_obja_ft"

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]
  valid_splits: ["test"]
  # test_splits: ["test"]
  k_test: 128

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
  use_dist_eval_sampler: False
